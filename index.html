<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This error often occurs when external instrumentation tries to overwrite the native fetch API.
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If we can't redefine it, it might already be protected or non-configurable.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
